<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パスワード入力</title>

<style>
html,
body {
    height: 100%;
    margin: 0;
}




body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

    font-family: sans-serif;

    /* 背景画像 */
    background: url("note.gif") repeat;
}



.password-box {
    text-align: center;
}


#password {
    width: 180px;
    padding: 12px;
    font-size: 24px;
    text-align: center;

    background-color: #ffffff;   /* 白色 */
    color: #000000;              /* 文字は黒 */
    border: 2px solid #666666;
    border-radius: 6px;
}
button {
    margin-left: 8px;
    padding: 10px 18px;
    font-size: 18px;
    cursor: pointer;
}

#error-message {
    min-height: 24px;
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="password-box">

    <h2>パスワードを入力してください</h2>

    <input
        type="text"
        id="password"
        inputmode="numeric"
        maxlength="4"
        autocomplete="off"
        autofocus
        aria-label="パスワード">

    <button type="button" onclick="checkPassword()">入る</button>
    <button type="button" onclick="location.href='index.htm'">表紙に戻る</button>

    <p id="error-message"></p>

</div>

<script>
function checkPassword() {
    const correctPassword = "3535";
    const passwordInput = document.getElementById("password");
    const errorMessage = document.getElementById("error-message");

    if (passwordInput.value === correctPassword) {

        // 下の x フォルダーにある index.htm へ移動
        window.location.href = "x/shounen/shounen.htm";

    } else {
        errorMessage.textContent =
            "パスワードが違います。もう一度入力してください。";

        // 入力した内容を消して、入力欄へ戻す
        passwordInput.value = "";
        passwordInput.focus();
    }
}

// Enterキーでも確認できる
document.getElementById("password").addEventListener(
    "keydown",
    function(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    }
);
</script>

</body>
</html>
